apiVersion: apps/v1
kind: Deployment
metadata:
  name: baseline-security-operator
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: baseline-security-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: baseline-security-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: baseline-security-operator
    spec:
      serviceAccountName: baseline-security-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: {{ .Values.operatorImage | quote }}
          args:
            - --leader-elect
            - --metrics-bind-address=0
          env:
            - name: RELATED_IMAGE_CONSOLE_PLUGIN
              value: {{ .Values.consolePluginImage | quote }}
            # The chart owns the default ClusterBaseline (below) so it can honor
            # .Values.profiles; keep the operator from creating a second one.
            - name: BASELINE_SECURITY_SKIP_DEFAULT_CR
              value: "true"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
{{ toYaml .Values.resources | indent 12 }}
