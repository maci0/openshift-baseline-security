apiVersion: v1
kind: ServiceAccount
metadata:
  name: baseline-security-operator
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: baseline-security-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: baseline-security-operator
subjects:
  - kind: ServiceAccount
    name: baseline-security-operator
    namespace: {{ .Values.namespace }}
