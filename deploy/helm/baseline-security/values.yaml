# Images. Pin to digests for production/disconnected installs.
operatorImage: quay.io/openshift-baseline-security/baseline-security-operator:0.3.1
consolePluginImage: quay.io/openshift-baseline-security/baseline-security-console-plugin:0.3.1

# Namespace the operator runs in (must exist or be created by the release).
namespace: openshift-baseline-security

# Create a default ClusterBaseline/cluster on install (zero-config onboarding).
defaultClusterBaseline: true

# Profiles for the default ClusterBaseline.
profiles:
  - cis

# Operator resource requests (no limits, per k8s guidance).
resources:
  requests:
    cpu: 10m
    memory: 64Mi
