# Derived from ubi9/nginx-120 defaults: root /opt/app-root/src, no plaintext 8080.
# Writable paths live under /tmp so the container can use a read-only rootfs
# (emptyDir mount). Logs go to the container stream, not on-disk files.
worker_processes auto;
error_log /dev/stderr;
pid /tmp/nginx.pid;

include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    # Log only non-2xx/3xx: console proxy can hit many static assets per page;
    # success lines bury real 4xx/5xx and inflate log volume for no signal.
    map $status $loggable {
        ~^[23]  0;
        default 1;
    }
    # Format name (combined) is required before the if= condition, else nginx
    # parses "if=$loggable" as the format name and fails to start.
    access_log /dev/stdout combined if=$loggable;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 4096;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;
    # Temp paths must be under the writable emptyDir when root is read-only.
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp 1 2;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;
    include /opt/app-root/etc/nginx.d/*.conf;

    server {
        listen 9443 ssl;
        listen [::]:9443 ssl;
        server_name _;
        root /opt/app-root/src;

        ssl_certificate /var/serving-cert/tls.crt;
        ssl_certificate_key /var/serving-cert/tls.key;
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout 10m;
        # Session tickets reuse a long-lived key; disable for forward secrecy.
        ssl_session_tickets off;
        # Pin the floor explicitly; do not rely on the base image default.
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers PROFILE=SYSTEM;
        ssl_prefer_server_ciphers on;

        # Static plugin assets only: reject uploads / large bodies so a client
        # cannot fill the writable emptyDir client_body_temp path.
        client_max_body_size 1k;
        autoindex off;

        # Serve plugin assets with their declared type only; block MIME sniffing.
        add_header X-Content-Type-Options nosniff always;
        # Assets are never framed; console loads them as module federation JS.
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        # HTTPS-only server (9443); pin HSTS for direct hits (console proxy has its own).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # Static assets only: no document execution surface if the URL is opened
        # directly. Module federation executes under the console document CSP.
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'" always;
        # Direct hits only (console proxies plugin assets under its own origin).
        # Keep embedding and window.opener isolation if the service URL is opened.
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;

        location / {
            # GET/HEAD only; POST/PUT/etc. would still hit client_body_temp.
            limit_except GET HEAD {
                deny all;
            }
            try_files $uri =404;
        }

        include /opt/app-root/etc/nginx.default.d/*.conf;
    }
}
