nodeLinker: node-modules
enableTelemetry: false
# Fail install if the lockfile would change (same gate as `yarn install --immutable` / CI).
enableImmutableInstalls: true
# Refuse packages whose lockfile checksums do not match (supply-chain integrity).
checksumBehavior: throw
packageExtensions:
  "@openshift-console/dynamic-plugin-sdk-webpack@*":
    dependencies:
      react: "^18.3.1"
