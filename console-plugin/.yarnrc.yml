nodeLinker: node-modules
enableTelemetry: false
# Fail install if the lockfile would change (same gate as `yarn install --immutable` / CI).
enableImmutableInstalls: true
# Refuse packages whose lockfile checksums do not match (supply-chain integrity).
checksumBehavior: throw
# Project-local cache only (no ~/.yarn host bleed; matches image YARN_ENABLE_GLOBAL_CACHE=false).
enableGlobalCache: false
# Prefer exact versions on `yarn add` so new deps are not introduced as floating carets.
# Existing package.json ranges stay; yarn.lock still pins the install graph.
defaultSemverRangePrefix: ""
packageExtensions:
  "@openshift-console/dynamic-plugin-sdk-webpack@*":
    dependencies:
      react: "^18.3.1"
