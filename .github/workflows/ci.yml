name: ci
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  operator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operator
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum
      - run: make test
      - run: make lint
      - name: verify generated files are current
        run: |
          make generate manifests
          git diff --exit-code
      - run: make verify-csv-rbac
      - name: validate OLM bundle
        run: make bundle

  console-plugin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: console-plugin
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm i -g corepack && corepack enable
      - run: yarn install --immutable
      - run: yarn lint
      - run: yarn typecheck
      - run: yarn test
      - run: yarn build

  # Extended fuzzing is nightly/on-demand only: per-PR runs already execute the
  # saved seed corpus via `make test`, so found crashers are permanent regressions.
  fuzz:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operator
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum
      - run: make fuzz
      - name: install uv (for promtool alert extractor)
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run: make test-alerts

  # Live-cluster e2e, on demand only. Provide a base64-encoded kubeconfig for a
  # cluster with the operator already installed as the E2E_KUBECONFIG secret;
  # without it the job skips instead of failing.
  e2e:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operator
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum
      - name: run Go e2e against the live cluster
        env:
          E2E_KUBECONFIG: ${{ secrets.E2E_KUBECONFIG }}
        run: |
          if [ -z "$E2E_KUBECONFIG" ]; then
            echo "E2E_KUBECONFIG secret not set; skipping live e2e."
            exit 0
          fi
          echo "$E2E_KUBECONFIG" | base64 -d > "$RUNNER_TEMP/kubeconfig"
          export KUBECONFIG="$RUNNER_TEMP/kubeconfig"
          make test-e2e

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm/baseline-security
      - run: helm template bs deploy/helm/baseline-security >/dev/null

  images:
    runs-on: ubuntu-latest
    needs: [operator, console-plugin]
    steps:
      - uses: actions/checkout@v7
      - run: docker build -t baseline-security-operator operator/
      - run: docker build -t baseline-security-console-plugin console-plugin/
