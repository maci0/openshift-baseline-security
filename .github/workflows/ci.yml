name: ci
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  operator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operator
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum
      - run: make test
      - run: make lint
      - name: verify generated files are current
        run: |
          make generate manifests
          git diff --exit-code
      - run: make verify-csv-rbac
      - name: validate OLM bundle
        run: make bundle

  console-plugin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: console-plugin
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm i -g corepack && corepack enable
      - run: yarn install --immutable
      - run: yarn lint
      - run: yarn typecheck
      - run: yarn test
      - run: yarn build

  # Extended fuzzing is nightly/on-demand only: per-PR runs already execute the
  # saved seed corpus via `make test`, so found crashers are permanent regressions.
  fuzz:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operator
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum
      - run: make fuzz

  images:
    runs-on: ubuntu-latest
    needs: [operator, console-plugin]
    steps:
      - uses: actions/checkout@v7
      - run: docker build -t baseline-security-operator operator/
      - run: docker build -t baseline-security-console-plugin console-plugin/
