# Scrape secure metrics via cluster (platform) monitoring. The operator lives in
# an openshift-* namespace, which user-workload monitoring never scrapes; the
# openshift.io/cluster-monitoring label on the namespace (config/manager) opts it
# into platform Prometheus instead. Cluster monitoring denies on-disk credentials
# (bearerTokenFile / caFile), so the scrape token comes from a Secret bound to a
# dedicated scraper ServiceAccount that holds the baseline-security-metrics-reader
# ClusterRole.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: baseline-security-metrics-scraper
  namespace: openshift-baseline-security
---
apiVersion: v1
kind: Secret
metadata:
  name: baseline-security-metrics-scraper-token
  namespace: openshift-baseline-security
  annotations:
    kubernetes.io/service-account.name: baseline-security-metrics-scraper
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: baseline-security-metrics-scraper
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: baseline-security-metrics-reader
subjects:
  - kind: ServiceAccount
    name: baseline-security-metrics-scraper
    namespace: openshift-baseline-security
---
# Platform Prometheus discovers scrape targets by listing Services/Endpoints/Pods
# in this namespace. The openshift.io/cluster-monitoring label adds the namespace
# to Prometheus's ServiceMonitor selector, but the cluster-monitoring operator
# only auto-grants this service-discovery read access to namespaces it manages,
# not arbitrary labeled ones. Without this Role/RoleBinding the prometheus-k8s
# ServiceAccount gets 403 on endpoints, discovery finds zero targets, and no
# metrics are ever scraped (ComplianceStatusStale fires). Mirrors the Role CMO
# creates for platform namespaces (openshift-apiserver, etc.).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prometheus-k8s
  namespace: openshift-baseline-security
  labels:
    app: baseline-security-operator
rules:
  - apiGroups: [""]
    resources: [services, endpoints, pods]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus-k8s
  namespace: openshift-baseline-security
  labels:
    app: baseline-security-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: prometheus-k8s
subjects:
  - kind: ServiceAccount
    name: prometheus-k8s
    namespace: openshift-monitoring
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: baseline-security-operator
  namespace: openshift-baseline-security
  labels:
    app: baseline-security-operator
spec:
  selector:
    matchLabels:
      app: baseline-security-operator
      control-plane: controller-manager
  endpoints:
    - port: https
      scheme: https
      path: /metrics
      interval: 30s
      tlsConfig:
        # Verify the service-ca identity through an injected ConfigMap. Cluster
        # monitoring forbids arbitrary caFile paths but permits this selector.
        serverName: baseline-security-operator-metrics.openshift-baseline-security.svc
        ca:
          configMap:
            name: baseline-security-metrics-serving-ca
            key: service-ca.crt
      authorization:
        type: Bearer
        credentials:
          name: baseline-security-metrics-scraper-token
          key: token
