apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Metrics scrape + alerts, scraped by cluster (platform) monitoring via the
# openshift.io/cluster-monitoring namespace label (config/manager). Inert only
# without the Prometheus Operator CRDs; ship by default.
resources:
  - serving-ca-configmap.yaml
  - servicemonitor.yaml
  - prometheusrule.yaml
