apiVersion: v1
kind: Service
metadata:
  name: baseline-security-operator-metrics
  namespace: openshift-baseline-security
  labels:
    app: baseline-security-operator
    control-plane: controller-manager
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: baseline-security-operator-metrics-cert
spec:
  # Internal scrape only; never promote to LoadBalancer/NodePort by hand-edit.
  type: ClusterIP
  ports:
    - name: https
      port: 8443
      protocol: TCP
      targetPort: 8443
  selector:
    app: baseline-security-operator
