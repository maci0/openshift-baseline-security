apiVersion: v1
kind: Namespace
metadata:
  name: openshift-baseline-security
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: baseline-security-operator
  namespace: openshift-baseline-security
  labels:
    app: baseline-security-operator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: baseline-security-operator
  template:
    metadata:
      labels:
        app: baseline-security-operator
    spec:
      serviceAccountName: baseline-security-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: baseline-security-operator
                topologyKey: kubernetes.io/hostname
      containers:
        # :latest is the local kustomize default. `make deploy IMG=... PLUGIN_IMG=...`
        # rewrites both refs before apply. OLM installs use versioned CSV tags.
        - name: manager
          image: quay.io/openshift-baseline-security/baseline-security-operator:latest
          args:
            - --leader-elect
            - --metrics-bind-address=:8443
            - --metrics-secure=true
            - --metrics-cert-dir=/var/run/metrics-certs
          env:
            - name: RELATED_IMAGE_CONSOLE_PLUGIN
              value: quay.io/openshift-baseline-security/baseline-security-console-plugin:latest
          ports:
            - name: https-metrics
              containerPort: 8443
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: metrics-certs
              mountPath: /var/run/metrics-certs
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            timeoutSeconds: 1
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            timeoutSeconds: 1
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: metrics-certs
          secret:
            secretName: baseline-security-operator-metrics-cert
            optional: true
            # Private key must not be group/world-readable inside the pod.
            defaultMode: 0400
