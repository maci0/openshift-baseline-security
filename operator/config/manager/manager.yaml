apiVersion: v1
kind: Namespace
metadata:
  name: openshift-baseline-security
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: baseline-security-operator
  namespace: openshift-baseline-security
  labels:
    app: baseline-security-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: baseline-security-operator
  template:
    metadata:
      labels:
        app: baseline-security-operator
    spec:
      serviceAccountName: baseline-security-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: quay.io/openshift-baseline-security/baseline-security-operator:latest
          args:
            - --leader-elect
          env:
            - name: RELATED_IMAGE_CONSOLE_PLUGIN
              value: quay.io/openshift-baseline-security/baseline-security-console-plugin:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
