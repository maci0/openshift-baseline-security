apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: baseline-security-leader-election
  namespace: openshift-baseline-security
rules:
  # create cannot use resourceNames; get/update/patch/delete are limited to the
  # LeaderElectionID lease (cmd/main.go: baseline-security-operator-lock).
  # list/watch are not used by the lease resource lock.
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [create]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    resourceNames: [baseline-security-operator-lock]
    verbs: [get, update, patch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: baseline-security-leader-election
  namespace: openshift-baseline-security
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: baseline-security-leader-election
subjects:
  - kind: ServiceAccount
    name: baseline-security-operator
    namespace: openshift-baseline-security
