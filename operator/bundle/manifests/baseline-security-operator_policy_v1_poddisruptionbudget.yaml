# Keep one replica during voluntary disruptions (drain/upgrade). Preferred
# anti-affinity alone does not block eviction of both pods.
# Namespace omitted: OLM installs into the operator namespace.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: baseline-security-operator
  labels:
    app: baseline-security-operator
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: baseline-security-operator
