---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: clusterbaselines.baselinesecurity.io
spec:
  group: baselinesecurity.io
  names:
    kind: ClusterBaseline
    listKind: ClusterBaselineList
    plural: clusterbaselines
    singular: clusterbaseline
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.score
      name: Score
      type: integer
    - jsonPath: .status.lastScanTime
      name: Last Scan
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ClusterBaseline is the cluster-scoped singleton configuring baseline
          compliance scanning. Must be named "cluster".
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ClusterBaselineSpec defines the desired baseline compliance
              posture.
            properties:
              complianceCatalogSource:
                default: redhat-operators
                description: |-
                  complianceCatalogSource is the OLM CatalogSource providing the
                  compliance-operator package (override for OKD or disconnected clusters).
                type: string
              console:
                description: console configures the console plugin deployment.
                properties:
                  managementState:
                    default: Managed
                    description: |-
                      managementState set to Managed deploys the baseline-security console
                      plugin and registers it with the console operator; Removed tears it down.
                    enum:
                    - Managed
                    - Removed
                    type: string
                type: object
              installComplianceOperator:
                default: Automatic
                description: |-
                  installComplianceOperator controls whether the operator creates an OLM
                  Subscription for the Compliance Operator when it is not installed.
                enum:
                - Automatic
                - Manual
                type: string
              profiles:
                default:
                - cis
                description: profiles selects which benchmark profile sets to scan
                  with.
                items:
                  description: |-
                    ProfileKey identifies one of the profile sets shipped by the Compliance
                    Operator content that this operator knows how to bind.
                  enum:
                  - cis
                  - pci-dss
                  - nist-moderate
                  - nist-high
                  - stig
                  - nerc-cip
                  - e8
                  - bsi
                  type: string
                minItems: 1
                type: array
                x-kubernetes-list-type: set
              remediation:
                description: remediation configures how ComplianceRemediations are
                  handled.
                properties:
                  apply:
                    default: Manual
                    description: |-
                      apply set to Automatic applies remediations after each scan
                      (ScanSetting autoApplyRemediations/autoUpdateRemediations). Node
                      remediations render into MachineConfigs and reboot nodes.
                    enum:
                    - Automatic
                    - Manual
                    type: string
                type: object
              schedule:
                default: 0 1 * * *
                description: schedule is the scan cron schedule, applied to the owned
                  ScanSetting.
                type: string
              tailoredProfiles:
                description: |-
                  tailoredProfiles names TailoredProfiles in the openshift-compliance
                  namespace to also scan with. Create the TailoredProfile with the
                  Compliance Operator first; this binds it into the baseline scan and
                  includes its results in the score. Names are capped so the generated
                  baseline-tp-<name> suite label remains a valid Kubernetes label value.
                items:
                  maxLength: 51
                  pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                  type: string
                type: array
                x-kubernetes-list-type: set
              waivers:
                description: |-
                  waivers exclude specific failing checks from the score as accepted risk.
                  Each entry names a ComplianceCheckResult and records why it is waived. A
                  waived check is removed from the pass/fail denominator and reported in the
                  Waived bucket instead, so an accepted risk neither inflates nor tanks the
                  score. Waivers are keyed by result name, which is stable across rescans.
                items:
                  description: WaiverEntry marks one ComplianceCheckResult as accepted
                    risk.
                  properties:
                    name:
                      description: name is the ComplianceCheckResult metadata.name
                        to waive.
                      maxLength: 253
                      minLength: 1
                      type: string
                    reason:
                      description: reason records why this check is accepted (for
                        audit).
                      maxLength: 1024
                      type: string
                  required:
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            required:
            - profiles
            type: object
          status:
            description: ClusterBaselineStatus is the observed state.
            properties:
              complianceOperatorVersion:
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              history:
                description: history holds score snapshots, oldest first, capped at
                  30 entries.
                items:
                  description: ScoreSnapshot is one point of score history, recorded
                    when a scan completes.
                  properties:
                    score:
                      format: int32
                      maximum: 100
                      minimum: 0
                      type: integer
                    time:
                      format: date-time
                      type: string
                  required:
                  - score
                  - time
                  type: object
                maxItems: 30
                type: array
              lastScanTime:
                format: date-time
                type: string
              nextScanTime:
                description: nextScanTime is the next scheduled scan, derived from
                  spec.schedule.
                format: date-time
                type: string
              profiles:
                items:
                  description: ProfileStatus summarizes check results for one selected
                    profile key.
                  properties:
                    error:
                      format: int32
                      type: integer
                    fail:
                      format: int32
                      type: integer
                    inconsistent:
                      description: |-
                        Inconsistent counts checks whose per-node results disagree across a
                        MachineConfigPool (compliance operator status INCONSISTENT). Excluded from
                        the score like Manual/Error; it flags a discrepancy that needs review.
                      format: int32
                      type: integer
                    info:
                      description: |-
                        Info counts informational checks (CO status INFO). Excluded from the
                        score like Manual; still reported so Overview totals match Results.
                      format: int32
                      type: integer
                    key:
                      description: |-
                        ProfileKey identifies one of the profile sets shipped by the Compliance
                        Operator content that this operator knows how to bind.
                      enum:
                      - cis
                      - pci-dss
                      - nist-moderate
                      - nist-high
                      - stig
                      - nerc-cip
                      - e8
                      - bsi
                      type: string
                    manual:
                      format: int32
                      type: integer
                    notApplicable:
                      format: int32
                      type: integer
                    pass:
                      format: int32
                      type: integer
                    profileNames:
                      items:
                        type: string
                      type: array
                    waived:
                      description: |-
                        Waived counts checks excluded from the score by a spec.waivers entry
                        (accepted risk). Excluded from the pass/fail denominator.
                      format: int32
                      type: integer
                  required:
                  - error
                  - fail
                  - inconsistent
                  - info
                  - key
                  - manual
                  - notApplicable
                  - pass
                  - waived
                  type: object
                type: array
              relatedObjects:
                description: relatedObjects lists the resources this baseline owns
                  or drives.
                items:
                  description: |-
                    ObjectRef points at a cluster resource this baseline owns or drives; consumed
                    by must-gather and support tooling.
                  properties:
                    group:
                      type: string
                    name:
                      type: string
                    namespace:
                      type: string
                    resource:
                      type: string
                  required:
                  - name
                  - resource
                  type: object
                type: array
              score:
                description: |-
                  score is pass/(pass+fail) across all profiles, 0-100. MANUAL, INFO,
                  ERROR, INCONSISTENT, and NOT-APPLICABLE are excluded from the score;
                  their counts are still reported per profile.
                format: int32
                maximum: 100
                minimum: 0
                type: integer
              tailoredProfiles:
                description: tailoredProfiles reports results for bound TailoredProfiles.
                items:
                  description: TailoredProfileStatus summarizes check results for
                    one bound TailoredProfile.
                  properties:
                    error:
                      format: int32
                      type: integer
                    fail:
                      format: int32
                      type: integer
                    inconsistent:
                      description: |-
                        Inconsistent counts checks whose per-node results disagree across a
                        MachineConfigPool (compliance operator status INCONSISTENT). Excluded from
                        the score like Manual/Error; it flags a discrepancy that needs review.
                      format: int32
                      type: integer
                    info:
                      description: |-
                        Info counts informational checks (CO status INFO). Excluded from the
                        score like Manual; still reported so Overview totals match Results.
                      format: int32
                      type: integer
                    manual:
                      format: int32
                      type: integer
                    name:
                      type: string
                    notApplicable:
                      format: int32
                      type: integer
                    pass:
                      format: int32
                      type: integer
                    waived:
                      description: |-
                        Waived counts checks excluded from the score by a spec.waivers entry
                        (accepted risk). Excluded from the pass/fail denominator.
                      format: int32
                      type: integer
                  required:
                  - error
                  - fail
                  - inconsistent
                  - info
                  - manual
                  - name
                  - notApplicable
                  - pass
                  - waived
                  type: object
                type: array
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: ClusterBaseline must be named 'cluster'
          rule: self.metadata.name == 'cluster'
    served: true
    storage: true
    subresources:
      status: {}
