---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: clusterbaselines.baselinesecurity.openshift.io
spec:
  group: baselinesecurity.openshift.io
  names:
    kind: ClusterBaseline
    listKind: ClusterBaselineList
    plural: clusterbaselines
    singular: clusterbaseline
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.score
      name: Score
      type: integer
    - jsonPath: .status.lastScanTime
      name: Last Scan
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ClusterBaseline is the cluster-scoped singleton configuring baseline
          compliance scanning. Must be named "cluster".
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ClusterBaselineSpec defines the desired baseline compliance
              posture.
            properties:
              complianceCatalogSource:
                description: |-
                  complianceCatalogSource is the OLM CatalogSource providing the
                  compliance-operator package (override for OKD or disconnected clusters).
                  Must be a DNS-1123 subdomain (CatalogSource metadata.name).
                  No CRD default on purpose: an omitted field must stay empty so the reconciler
                  auto-detects the cluster flavor (redhat-operators on OCP, community-operators
                  on OKD). A CRD default here would make the field never-empty and silently
                  defeat that detection, breaking zero-config CO install on OKD. MinLength only
                  validates present values, so absent stays "" and reaches auto-detection.
                maxLength: 253
                minLength: 1
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                type: string
              console:
                description: console configures the console plugin deployment.
                properties:
                  managementState:
                    default: Managed
                    description: |-
                      managementState set to Managed deploys the baseline-security console
                      plugin and registers it with the console operator; Removed tears it down.
                    enum:
                    - Managed
                    - Removed
                    type: string
                type: object
              installComplianceOperator:
                default: Automatic
                description: |-
                  installComplianceOperator controls whether the operator creates an OLM
                  Subscription for the Compliance Operator when it is not installed.
                enum:
                - Automatic
                - Manual
                type: string
              profiles:
                default:
                - cis
                description: |-
                  profiles selects which benchmark profile sets to scan with. An empty list
                  (together with no tailoredProfiles) disables scanning: the operator prunes
                  the ScanSettingBindings and clears the score, keeping the CR and history.
                  New installs still default to {cis}; clear it explicitly to stop scanning.
                  Capped at the number of known ProfileKey enum values (listType=set).
                items:
                  description: |-
                    ProfileKey identifies one of the profile sets shipped by the Compliance
                    Operator content that this operator knows how to bind.
                  enum:
                  - cis
                  - pci-dss
                  - nist-moderate
                  - nist-high
                  - stig
                  - nerc-cip
                  - e8
                  - bsi
                  type: string
                maxItems: 8
                type: array
                x-kubernetes-list-type: set
              remediation:
                description: remediation configures how ComplianceRemediations are
                  handled.
                properties:
                  apply:
                    default: Manual
                    description: |-
                      apply set to Automatic applies remediations after each scan
                      (ScanSetting autoApplyRemediations/autoUpdateRemediations). Node
                      remediations render into MachineConfigs and reboot nodes.
                    enum:
                    - Automatic
                    - Manual
                    type: string
                type: object
              schedule:
                default: 0 1 * * *
                description: |-
                  schedule is the scan cron schedule, applied to the owned ScanSetting.
                  Must be standard five-field cron (minute hour dom month dow), for example
                  "0 1 * * *". Descriptors such as "@daily" or "@every 1h" are rejected at
                  reconcile (InvalidSchedule Degraded) because Compliance Operator
                  ScanSettings only accept five-field forms. Empty uses the default.
                  Bounded so a hostile or accidental multi-megabyte string cannot bloat the
                  CR or inflate condition messages that embed the value.
                  Empty/whitespace uses DefaultScanSchedule at reconcile (same as CRD default).
                maxLength: 128
                type: string
              scoring:
                description: scoring configures how the compliance score is computed.
                properties:
                  mode:
                    default: Flat
                    description: mode selects flat (default) or severity-weighted
                      scoring.
                    enum:
                    - Flat
                    - SeverityWeighted
                    type: string
                type: object
              tailoredProfiles:
                description: |-
                  tailoredProfiles names TailoredProfiles in the openshift-compliance
                  namespace to also scan with. Create the TailoredProfile with the
                  Compliance Operator first; this binds it into the baseline scan and
                  includes its results in the score. Names are capped so the generated
                  baseline-tp-<name> suite label remains a valid Kubernetes label value.
                items:
                  maxLength: 51
                  pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                  type: string
                maxItems: 32
                type: array
                x-kubernetes-list-type: set
              waivers:
                description: |-
                  waivers exclude specific failing checks from the score as accepted risk.
                  Each entry names a ComplianceCheckResult (stable across rescans). Only a
                  current FAIL with a non-expired waiver is remapped to the Waived bucket and
                  dropped from the pass/fail denominator; a waived check that later PASSes is
                  scored as PASS again. Capped so a hostile list cannot bloat the CR.
                items:
                  description: WaiverEntry marks one ComplianceCheckResult as accepted
                    risk.
                  properties:
                    approvedBy:
                      description: approvedBy records who approved the waiver (for
                        audit).
                      maxLength: 253
                      type: string
                    expiresAt:
                      description: |-
                        expiresAt is when the waiver stops applying. After it passes, the check is
                        scored by its raw status again (an accepted risk is not permanent).
                      format: date-time
                      type: string
                    name:
                      description: |-
                        name is the ComplianceCheckResult metadata.name to waive.
                        Must be a DNS-1123 subdomain (same shape as Kubernetes resource names).
                      maxLength: 253
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                      type: string
                    reason:
                      description: reason records why this check is accepted (for
                        audit).
                      maxLength: 1024
                      type: string
                    requestedBy:
                      description: requestedBy records who requested the waiver (for
                        audit).
                      maxLength: 253
                      type: string
                    reviewBy:
                      description: reviewBy is a reminder date to re-evaluate the
                        waiver; informational.
                      format: date-time
                      type: string
                  required:
                  - name
                  type: object
                maxItems: 256
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            required:
            - profiles
            type: object
          status:
            description: ClusterBaselineStatus is the observed state.
            properties:
              complianceOperatorVersion:
                description: |-
                  complianceOperatorVersion is the adopted Compliance Operator CSV version
                  string when a matching CSV is found; empty while CO is not yet installed.
                maxLength: 128
                type: string
              conditions:
                description: |-
                  conditions report readiness rollups and detail (Available, Progressing,
                  Degraded, plus ComplianceOperatorReady / ScanConfigured / etc.).
                  Map by type so Server-Side Apply and strategic merges update one condition
                  without replacing the whole list (Kubernetes API convention).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              diffBaseFailures:
                description: |-
                  diffBaseFailures retains the scan-before-last FAIL snapshot while results
                  for lastScanTime settle, allowing late CheckResult events to correct the
                  current newlyFailed/fixed diff. Internal bookkeeping only; not a consumer
                  contract (may change in 0.x without a major bump).
                items:
                  maxLength: 253
                  type: string
                maxItems: 4096
                type: array
                x-kubernetes-list-type: set
              diffBaseScanTime:
                description: |-
                  diffBaseScanTime identifies the lastScanTime whose diffBaseFailures apply.
                  It is nil for the first completed scan, which has no comparison baseline.
                  Internal bookkeeping only; not a consumer contract: shape and presence
                  may change in 0.x without a major bump; use newlyFailed and fixed for
                  user-facing regression views (and history length for "prior scan exists").
                format: date-time
                type: string
              fixed:
                description: |-
                  fixed lists owned checks that were FAIL at the previous scan but are no
                  longer FAIL now (improvements since last scan). A waived FAIL is still a
                  FAIL outcome and does not appear here until the check actually PASSes.
                items:
                  maxLength: 253
                  type: string
                maxItems: 4096
                type: array
                x-kubernetes-list-type: set
              history:
                description: history holds score snapshots, oldest first, capped at
                  30 entries.
                items:
                  description: |-
                    ScoreSnapshot is one point of score history, recorded when a scan completes.
                    Score is under the scoring mode active at capture time (Flat or
                    SeverityWeighted). Mode flips do not rewrite prior points under the new
                    formula; on the next completed scan under the new mode the operator clears
                    overall and per-profile history rings and writes a fresh point so charts never
                    mix Flat and SeverityWeighted values (ADR-008).
                  properties:
                    score:
                      description: score is 0-100 under the scoring mode active when
                        the point was written.
                      format: int32
                      maximum: 100
                      minimum: 0
                      type: integer
                    time:
                      description: time is when this score was recorded (typically
                        the scan completion time).
                      format: date-time
                      type: string
                  required:
                  - score
                  - time
                  type: object
                maxItems: 30
                type: array
              lastScanTime:
                description: |-
                  lastScanTime is when the last completed scan finished (suite phase DONE).
                  Nil until the first scan completes. Kept when scanning is disabled (empty
                  profiles and tailored) so re-enable does not invent false regressions;
                  the last-scan Prometheus gauge is suppressed while scanning is off.
                format: date-time
                type: string
              newlyFailed:
                description: |-
                  newlyFailed lists owned checks that are FAIL now but were not FAIL at the
                  previous completed scan (regressions since last scan). Waived FAILs still
                  count as FAIL outcomes here (accepting risk is not a regression clear).
                  Bounded by fail count and hard-capped so a hostile status cannot brick
                  Status().Update admission.
                items:
                  maxLength: 253
                  type: string
                maxItems: 4096
                type: array
                x-kubernetes-list-type: set
              nextScanTime:
                description: nextScanTime is the next scheduled scan, derived from
                  spec.schedule.
                format: date-time
                type: string
              previousFailures:
                description: |-
                  previousFailures is the internal FAIL snapshot from the last completed scan,
                  used to compute newlyFailed/fixed on the next scan. Includes waived FAILs
                  (score exclusion is separate). Not a consumer contract: shape and presence
                  may change in 0.x without a major bump; use newlyFailed and fixed for
                  user-facing regression views.
                items:
                  maxLength: 253
                  type: string
                maxItems: 4096
                type: array
                x-kubernetes-list-type: set
              profiles:
                description: profiles summarizes results per selected built-in profile
                  key.
                items:
                  description: ProfileStatus summarizes check results for one selected
                    profile key.
                  properties:
                    error:
                      description: |-
                        Error counts checks that could not be evaluated (CO status ERROR, or an
                        empty/unknown raw status). Excluded from the score; still reported.
                      format: int32
                      minimum: 0
                      type: integer
                    fail:
                      description: |-
                        Fail counts checks that failed and are not actively waived. Used in the
                        score denominator; waived FAILs are counted under Waived instead.
                      format: int32
                      minimum: 0
                      type: integer
                    history:
                      description: history holds this profile's score snapshots, oldest
                        first, capped at 30.
                      items:
                        description: |-
                          ScoreSnapshot is one point of score history, recorded when a scan completes.
                          Score is under the scoring mode active at capture time (Flat or
                          SeverityWeighted). Mode flips do not rewrite prior points under the new
                          formula; on the next completed scan under the new mode the operator clears
                          overall and per-profile history rings and writes a fresh point so charts never
                          mix Flat and SeverityWeighted values (ADR-008).
                        properties:
                          score:
                            description: score is 0-100 under the scoring mode active
                              when the point was written.
                            format: int32
                            maximum: 100
                            minimum: 0
                            type: integer
                          time:
                            description: time is when this score was recorded (typically
                              the scan completion time).
                            format: date-time
                            type: string
                        required:
                        - score
                        - time
                        type: object
                      maxItems: 30
                      type: array
                    inconsistent:
                      description: |-
                        Inconsistent counts checks that remain INCONSISTENT after benign collapse
                        (PASS where applicable, NOT-APPLICABLE elsewhere becomes PASS). Genuine
                        PASS-vs-FAIL/ERROR node splits stay here. Excluded from the score like
                        Manual/Error; it flags a real discrepancy that needs review.
                      format: int32
                      minimum: 0
                      type: integer
                    info:
                      description: |-
                        Info counts informational checks (CO status INFO). Excluded from the
                        score like Manual; still reported so Overview totals match Results.
                      format: int32
                      minimum: 0
                      type: integer
                    key:
                      description: key is the ProfileKey from spec.profiles this status
                        row describes.
                      enum:
                      - cis
                      - pci-dss
                      - nist-moderate
                      - nist-high
                      - stig
                      - nerc-cip
                      - e8
                      - bsi
                      type: string
                    manual:
                      description: |-
                        Manual counts checks that require human review (CO status MANUAL).
                        Excluded from the score; still reported so Overview totals match Results.
                      format: int32
                      minimum: 0
                      type: integer
                    notApplicable:
                      description: |-
                        NotApplicable counts checks that do not apply on this cluster (CO status
                        NOT-APPLICABLE, SKIP, or benign INCONSISTENT collapsed to N/A). Excluded
                        from the score.
                      format: int32
                      minimum: 0
                      type: integer
                    pass:
                      description: |-
                        Pass counts checks that passed (including benign INCONSISTENT collapsed
                        to PASS). Used in the score numerator and denominator.
                      format: int32
                      minimum: 0
                      type: integer
                    profileNames:
                      description: profileNames are the Compliance Operator Profile
                        names bound for this key.
                      items:
                        maxLength: 253
                        type: string
                      maxItems: 16
                      type: array
                      x-kubernetes-list-type: set
                    waived:
                      description: |-
                        Waived counts checks excluded from the score by a spec.waivers entry
                        (accepted risk). Excluded from the pass/fail denominator.
                      format: int32
                      minimum: 0
                      type: integer
                  required:
                  - error
                  - fail
                  - inconsistent
                  - info
                  - key
                  - manual
                  - notApplicable
                  - pass
                  - waived
                  type: object
                maxItems: 16
                type: array
                x-kubernetes-list-map-keys:
                - key
                x-kubernetes-list-type: map
              relatedObjects:
                description: relatedObjects lists the resources this baseline owns
                  or drives.
                items:
                  description: |-
                    ObjectRef points at a cluster resource this baseline owns or drives; consumed
                    by must-gather and support tooling.
                  properties:
                    group:
                      description: group is the API group (empty for core resources).
                      maxLength: 253
                      type: string
                    name:
                      description: name is the object metadata.name.
                      maxLength: 253
                      minLength: 1
                      type: string
                    namespace:
                      description: namespace is set for namespaced objects; empty
                        for cluster-scoped ones.
                      maxLength: 63
                      type: string
                    resource:
                      description: resource is the plural resource name (for example,
                        scansettings).
                      maxLength: 253
                      minLength: 1
                      type: string
                  required:
                  - name
                  - resource
                  type: object
                maxItems: 64
                type: array
              remediationBatch:
                description: remediationBatch tracks an in-progress MachineConfigPool-paused
                  batch apply.
                properties:
                  pauseOwner:
                    description: |-
                      pauseOwner is copied to each pool the operator actually pauses. It lets the
                      resume path preserve pools that an administrator had already paused.
                      Empty identifies a legacy in-flight batch created before ownership tracking.
                    maxLength: 253
                    type: string
                  phase:
                    description: phase is Applying while pools are paused and remediations
                      are being applied.
                    enum:
                    - Applying
                    maxLength: 32
                    type: string
                  pools:
                    description: pools are the MachineConfigPools paused for this
                      batch.
                    items:
                      maxLength: 253
                      type: string
                    maxItems: 32
                    type: array
                    x-kubernetes-list-type: set
                  remediations:
                    description: remediations are the ComplianceRemediation names
                      in this batch.
                    items:
                      maxLength: 253
                      type: string
                    maxItems: 256
                    type: array
                    x-kubernetes-list-type: set
                  startedAt:
                    description: startedAt bounds how long pools stay paused before
                      a forced resume.
                    format: date-time
                    type: string
                required:
                - phase
                - startedAt
                type: object
              score:
                description: |-
                  score across all profiles, 0-100: pass/(pass+fail) in the default Flat
                  mode, a severity-weighted ratio when spec.scoring.mode is
                  SeverityWeighted. Benign INCONSISTENT is remapped to PASS or
                  NOT-APPLICABLE first. Residual genuine INCONSISTENT, plus MANUAL, INFO,
                  ERROR, WAIVED, and NOT-APPLICABLE, are excluded from the score; their
                  counts are still reported per profile.
                format: int32
                maximum: 100
                minimum: 0
                type: integer
              tailoredProfiles:
                description: tailoredProfiles reports results for bound TailoredProfiles.
                items:
                  description: TailoredProfileStatus summarizes check results for
                    one bound TailoredProfile.
                  properties:
                    error:
                      description: |-
                        Error counts checks that could not be evaluated (CO status ERROR, or an
                        empty/unknown raw status). Excluded from the score; still reported.
                      format: int32
                      minimum: 0
                      type: integer
                    fail:
                      description: |-
                        Fail counts checks that failed and are not actively waived. Used in the
                        score denominator; waived FAILs are counted under Waived instead.
                      format: int32
                      minimum: 0
                      type: integer
                    history:
                      description: history holds this profile's score snapshots, oldest
                        first, capped at 30.
                      items:
                        description: |-
                          ScoreSnapshot is one point of score history, recorded when a scan completes.
                          Score is under the scoring mode active at capture time (Flat or
                          SeverityWeighted). Mode flips do not rewrite prior points under the new
                          formula; on the next completed scan under the new mode the operator clears
                          overall and per-profile history rings and writes a fresh point so charts never
                          mix Flat and SeverityWeighted values (ADR-008).
                        properties:
                          score:
                            description: score is 0-100 under the scoring mode active
                              when the point was written.
                            format: int32
                            maximum: 100
                            minimum: 0
                            type: integer
                          time:
                            description: time is when this score was recorded (typically
                              the scan completion time).
                            format: date-time
                            type: string
                        required:
                        - score
                        - time
                        type: object
                      maxItems: 30
                      type: array
                    inconsistent:
                      description: |-
                        Inconsistent counts checks that remain INCONSISTENT after benign collapse
                        (PASS where applicable, NOT-APPLICABLE elsewhere becomes PASS). Genuine
                        PASS-vs-FAIL/ERROR node splits stay here. Excluded from the score like
                        Manual/Error; it flags a real discrepancy that needs review.
                      format: int32
                      minimum: 0
                      type: integer
                    info:
                      description: |-
                        Info counts informational checks (CO status INFO). Excluded from the
                        score like Manual; still reported so Overview totals match Results.
                      format: int32
                      minimum: 0
                      type: integer
                    manual:
                      description: |-
                        Manual counts checks that require human review (CO status MANUAL).
                        Excluded from the score; still reported so Overview totals match Results.
                      format: int32
                      minimum: 0
                      type: integer
                    name:
                      description: name is the TailoredProfile metadata.name in openshift-compliance.
                      maxLength: 51
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                      type: string
                    notApplicable:
                      description: |-
                        NotApplicable counts checks that do not apply on this cluster (CO status
                        NOT-APPLICABLE, SKIP, or benign INCONSISTENT collapsed to N/A). Excluded
                        from the score.
                      format: int32
                      minimum: 0
                      type: integer
                    pass:
                      description: |-
                        Pass counts checks that passed (including benign INCONSISTENT collapsed
                        to PASS). Used in the score numerator and denominator.
                      format: int32
                      minimum: 0
                      type: integer
                    waived:
                      description: |-
                        Waived counts checks excluded from the score by a spec.waivers entry
                        (accepted risk). Excluded from the pass/fail denominator.
                      format: int32
                      minimum: 0
                      type: integer
                  required:
                  - error
                  - fail
                  - inconsistent
                  - info
                  - manual
                  - name
                  - notApplicable
                  - pass
                  - waived
                  type: object
                maxItems: 32
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: ClusterBaseline must be named 'cluster'
          rule: self.metadata.name == 'cluster'
    served: true
    storage: true
    subresources:
      status: {}
