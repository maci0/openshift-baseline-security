# Human-facing roles, aggregated into the built-in view/admin roles so
# console users get sensible access without extra bindings.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: baseline-security-viewer
  labels:
    rbac.authorization.k8s.io/aggregate-to-view: "true"
    rbac.authorization.k8s.io/aggregate-to-cluster-reader: "true"
rules:
  - apiGroups: [baselinesecurity.io]
    resources: [clusterbaselines]
    verbs: [get, list, watch]
  - apiGroups: [compliance.openshift.io]
    resources:
      - compliancecheckresults
      - compliancescans
      - compliancesuites
      - complianceremediations
      - profiles
    verbs: [get, list, watch]
