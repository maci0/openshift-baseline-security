apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  name: baseline-security-operator.v0.4.0
  namespace: placeholder
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "baselinesecurity.openshift.io/v1alpha1",
          "kind": "ClusterBaseline",
          "metadata": {"name": "cluster"},
          "spec": {"profiles": ["cis"]}
        }
      ]
    capabilities: Seamless Upgrades
    categories: Security
    containerImage: quay.io/openshift-baseline-security/baseline-security-operator:0.4.0
    repository: https://github.com/maci0/openshift-baseline-security
    description: Baseline benchmark compliance scanning with a native console UI,
      built on the Red Hat Compliance Operator.
    features.operators.openshift.io/fips-compliant: "false"
    features.operators.openshift.io/proxy-aware: "false"
    features.operators.openshift.io/tls-profiles: "false"
    features.operators.openshift.io/token-auth-aws: "false"
    features.operators.openshift.io/token-auth-azure: "false"
    features.operators.openshift.io/token-auth-gcp: "false"
spec:
  displayName: Baseline Security
  description: |
    Gives the cluster an out-of-the-box compliance baseline: install, and the
    cluster continuously benchmarks itself against the CIS OpenShift Benchmark
    (optionally PCI-DSS, NIST 800-53, DISA STIG, NERC CIP, ACSC E8, BSI),
    with results rendered natively in the OpenShift web console under
    Administration → Compliance.

    The scan engine is the Red Hat Compliance Operator (installed automatically
    if absent). This operator adds zero-configuration defaults, score
    aggregation (optional severity-weighted mode), waivers, scan regression
    status, MachineConfigPool-paused batch remediation, and an admin-console
    plugin: dashboard, filterable check results, remediation apply, profile
    and TailoredProfile selection, and report export.

    Maturity is alpha (SemVer 0.x): read Migration notes in the project
    Changelog before upgrading between minor versions (breaking behavior may
    land in minors until 1.0). Supported host is OpenShift 4.22 only
    (minKubeVersion 1.35.0). Requires a default StorageClass for scan result
    storage.
  maturity: alpha
  version: 0.4.0
  replaces: baseline-security-operator.v0.3.1
  minKubeVersion: 1.35.0
  keywords: [security, compliance, cis, benchmark, openscap]
  maintainers:
    - name: maci
      email: maci.stgn@gmail.com
  provider:
    name: openshift-baseline-security
  links:
    - name: Source
      url: https://github.com/maci0/openshift-baseline-security
    - name: Changelog
      url: https://github.com/maci0/openshift-baseline-security/blob/main/CHANGELOG.md
  # Install into openshift-baseline-security so RBAC subjects and the metrics
  # Service match the ServiceAccount namespace in the bundle manifests.
  installModes:
    # Cluster-scoped operator: watches the ClusterBaseline singleton and manages
    # resources across openshift-compliance / openshift-baseline-security.
    - type: OwnNamespace
      supported: false
    - type: SingleNamespace
      supported: false
    - type: MultiNamespace
      supported: false
    - type: AllNamespaces
      supported: true
  customresourcedefinitions:
    owned:
      - kind: ClusterBaseline
        name: clusterbaselines.baselinesecurity.openshift.io
        version: v1alpha1
        displayName: Cluster Baseline
        description: Cluster-scoped singleton configuring baseline compliance scanning.
  install:
    strategy: deployment
    spec:
      permissions:
        - serviceAccountName: baseline-security-operator
          rules:
            # create cannot use resourceNames; mutate only the LeaderElectionID lease.
            - apiGroups: [coordination.k8s.io]
              resources: [leases]
              verbs: [create]
            - apiGroups: [coordination.k8s.io]
              resources: [leases]
              resourceNames: [baseline-security-operator-lock]
              verbs: [get, update, patch, delete]
            - apiGroups: [""]
              resources: [events]
              verbs: [create, patch]
      clusterPermissions:
        - serviceAccountName: baseline-security-operator
          rules:
            # createIfMissing only; AlreadyExists is fine without get/list/watch.
            - apiGroups: [""]
              resources: [namespaces]
              verbs: [create]
            - apiGroups: [""]
              resources: [configmaps]
              verbs: [create]
            - apiGroups: [""]
              resources: [configmaps]
              resourceNames: [baseline-security-compliance-dashboard]
              verbs: [get, patch, update]
            # Plugin Service (fixed name). create/list/watch unscoped; mutate scoped.
            - apiGroups: [""]
              resources: [services]
              verbs: [create, list, watch]
            - apiGroups: [""]
              resources: [services]
              resourceNames: [baseline-security-console-plugin]
              verbs: [get, delete, patch, update]
            - apiGroups: [""]
              resources: [persistentvolumeclaims]
              verbs: [get, list, watch]
            - apiGroups: [apps]
              resources: [deployments]
              verbs: [create, list, watch]
            - apiGroups: [apps]
              resources: [deployments]
              resourceNames: [baseline-security-console-plugin]
              verbs: [get, delete, patch, update]
            - apiGroups: [policy]
              resources: [poddisruptionbudgets]
              verbs: [create, list, watch]
            - apiGroups: [policy]
              resources: [poddisruptionbudgets]
              resourceNames: [baseline-security-console-plugin]
              verbs: [get, delete, patch, update]
            - apiGroups: [baselinesecurity.openshift.io]
              resources: [clusterbaselines]
              verbs: [create, get, list, patch, update, watch]
            - apiGroups: [baselinesecurity.openshift.io]
              resources: [clusterbaselines/status]
              verbs: [get, patch, update]
            - apiGroups: [baselinesecurity.openshift.io]
              resources: [clusterbaselines/finalizers]
              verbs: [update]
            - apiGroups: [compliance.openshift.io]
              resources: [compliancecheckresults, compliancescans, compliancesuites]
              verbs: [get, list, watch]
            - apiGroups: [compliance.openshift.io]
              resources: [complianceremediations]
              verbs: [get, list, watch, patch]
            - apiGroups: [compliance.openshift.io]
              resources: [scansettingbindings]
              verbs: [create, delete, get, list, patch, update, watch]
            # ScanSetting name is fixed (baseline); create/list/watch unscoped.
            - apiGroups: [compliance.openshift.io]
              resources: [scansettings]
              verbs: [create, list, watch]
            - apiGroups: [compliance.openshift.io]
              resources: [scansettings]
              resourceNames: [baseline]
              verbs: [get, delete, patch, update]
            - apiGroups: [machineconfiguration.openshift.io]
              resources: [machineconfigpools]
              verbs: [get, list, watch, patch]
            - apiGroups: [console.openshift.io]
              resources: [consoleplugins]
              verbs: [create, list, watch]
            - apiGroups: [console.openshift.io]
              resources: [consoleplugins]
              resourceNames: [baseline-security-console-plugin]
              verbs: [get, delete, patch, update]
            # Singleton consoles/cluster only (Get+Update for plugin registration).
            - apiGroups: [operator.openshift.io]
              resources: [consoles]
              resourceNames: [cluster]
              verbs: [get, patch, update]
            - apiGroups: [operators.coreos.com]
              resources: [clusterserviceversions]
              verbs: [get, list, watch]
            # Read-only: auto-detect OKD (community-operators) vs OCP catalog.
            - apiGroups: [operators.coreos.com]
              resources: [catalogsources]
              verbs: [get, list, watch]
            # Fixed name compliance-operator; list/watch unused.
            - apiGroups: [operators.coreos.com]
              resources: [operatorgroups]
              verbs: [create]
            - apiGroups: [operators.coreos.com]
              resources: [operatorgroups]
              resourceNames: [compliance-operator]
              verbs: [get, patch, update]
            - apiGroups: [operators.coreos.com]
              resources: [subscriptions]
              verbs: [create]
            - apiGroups: [operators.coreos.com]
              resources: [subscriptions]
              resourceNames: [compliance-operator]
              verbs: [get, patch, update]
            - apiGroups: [authentication.k8s.io]
              resources: [tokenreviews]
              verbs: [create]
            - apiGroups: [authorization.k8s.io]
              resources: [subjectaccessreviews]
              verbs: [create]
      deployments:
        - name: baseline-security-operator
          spec:
            replicas: 2
            strategy:
              type: RollingUpdate
              rollingUpdate:
                maxUnavailable: 1
                maxSurge: 1
            selector:
              matchLabels:
                app: baseline-security-operator
            template:
              metadata:
                labels:
                  app: baseline-security-operator
              spec:
                serviceAccountName: baseline-security-operator
                enableServiceLinks: false
                terminationGracePeriodSeconds: 30
                securityContext:
                  runAsNonRoot: true
                  seccompProfile:
                    type: RuntimeDefault
                affinity:
                  podAntiAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                      - weight: 100
                        podAffinityTerm:
                          labelSelector:
                            matchLabels:
                              app: baseline-security-operator
                          topologyKey: kubernetes.io/hostname
                containers:
                  - name: manager
                    image: quay.io/openshift-baseline-security/baseline-security-operator:0.4.0
                    args:
                      - --leader-elect
                      - --metrics-bind-address=:8443
                      - --metrics-secure=true
                      - --metrics-cert-dir=/var/run/metrics-certs
                      - --health-probe-bind-address=:8081
                    env:
                      - name: RELATED_IMAGE_CONSOLE_PLUGIN
                        value: quay.io/openshift-baseline-security/baseline-security-console-plugin:0.4.0
                      # Optional: set to "true" (also accepts 1/yes) to skip creating
                      # ClusterBaseline/cluster when none exist. Must match envSkipDefaultCR
                      # in cmd/main.go (BASELINE_SECURITY_SKIP_DEFAULT_CR).
                      # - name: BASELINE_SECURITY_SKIP_DEFAULT_CR
                      #   value: "true"
                    ports:
                      - name: https-metrics
                        containerPort: 8443
                        protocol: TCP
                    securityContext:
                      allowPrivilegeEscalation: false
                      privileged: false
                      capabilities:
                        drop: [ALL]
                      seccompProfile:
                        type: RuntimeDefault
                      readOnlyRootFilesystem: true
                      runAsNonRoot: true
                    volumeMounts:
                      - name: metrics-certs
                        mountPath: /var/run/metrics-certs
                        readOnly: true
                      - name: tmp
                        mountPath: /tmp
                    startupProbe:
                      httpGet:
                        path: /healthz
                        port: 8081
                      periodSeconds: 10
                      timeoutSeconds: 1
                      failureThreshold: 30
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 8081
                      timeoutSeconds: 1
                      periodSeconds: 20
                      failureThreshold: 3
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: 8081
                      timeoutSeconds: 1
                      periodSeconds: 10
                      failureThreshold: 3
                    resources:
                      requests:
                        cpu: 10m
                        memory: 64Mi
                      limits:
                        cpu: 500m
                        memory: 256Mi
                    terminationMessagePolicy: FallbackToLogsOnError
                volumes:
                  - name: metrics-certs
                    secret:
                      secretName: baseline-security-operator-metrics-cert
                      optional: true
                      defaultMode: 0400
                  - name: tmp
                    emptyDir:
                      sizeLimit: 64Mi
  relatedImages:
    - name: manager
      image: quay.io/openshift-baseline-security/baseline-security-operator:0.4.0
    - name: console-plugin
      image: quay.io/openshift-baseline-security/baseline-security-console-plugin:0.4.0
