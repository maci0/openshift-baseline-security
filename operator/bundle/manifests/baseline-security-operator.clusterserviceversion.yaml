apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  name: baseline-security-operator.v0.2.1
  namespace: placeholder
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "baselinesecurity.io/v1alpha1",
          "kind": "ClusterBaseline",
          "metadata": {"name": "cluster"},
          "spec": {"profiles": ["cis"]}
        }
      ]
    capabilities: Seamless Upgrades
    categories: Security
    containerImage: quay.io/openshift-baseline-security/baseline-security-operator:0.2.1
    repository: https://github.com/maci0/baseline-security-operator
    description: Baseline benchmark compliance scanning with a native console UI,
      built on the Red Hat Compliance Operator.
    features.operators.openshift.io/disconnected: "true"
    features.operators.openshift.io/fips-compliant: "false"
    features.operators.openshift.io/proxy-aware: "false"
    features.operators.openshift.io/tls-profiles: "false"
    features.operators.openshift.io/token-auth-aws: "false"
    features.operators.openshift.io/token-auth-azure: "false"
    features.operators.openshift.io/token-auth-gcp: "false"
spec:
  displayName: Baseline Security
  description: |
    Gives the cluster an out-of-the-box compliance baseline: install, and the
    cluster continuously benchmarks itself against the CIS OpenShift Benchmark
    (optionally PCI-DSS, NIST 800-53, DISA STIG, NERC CIP, ACSC E8, BSI),
    with results rendered natively in the OpenShift web console.

    The scan engine is the Red Hat Compliance Operator (installed automatically
    if absent). This operator adds zero-configuration defaults, score
    aggregation, and an admin-console plugin: dashboard, filterable check
    results, remediation apply, and profile selection.

    Requires a default StorageClass for scan result storage.
  maturity: alpha
  version: 0.2.1
  replaces: baseline-security-operator.v0.2.0
  minKubeVersion: 1.35.0
  keywords: [security, compliance, cis, benchmark, openscap]
  maintainers:
    - name: maci
      email: maci.stgn@gmail.com
  provider:
    name: openshift-baseline-security
  links:
    - name: Source
      url: https://github.com/maci0/baseline-security-operator
  # Install into openshift-baseline-security so RBAC subjects and the metrics
  # Service match the ServiceAccount namespace in the bundle manifests.
  installModes:
    # Cluster-scoped operator: watches the ClusterBaseline singleton and manages
    # resources across openshift-compliance / openshift-baseline-security.
    - type: OwnNamespace
      supported: false
    - type: SingleNamespace
      supported: false
    - type: MultiNamespace
      supported: false
    - type: AllNamespaces
      supported: true
  customresourcedefinitions:
    owned:
      - kind: ClusterBaseline
        name: clusterbaselines.baselinesecurity.io
        version: v1alpha1
        displayName: Cluster Baseline
        description: Cluster-scoped singleton configuring baseline compliance scanning.
  install:
    strategy: deployment
    spec:
      permissions:
        - serviceAccountName: baseline-security-operator
          rules:
            - apiGroups: [coordination.k8s.io]
              resources: [leases]
              verbs: [get, list, watch, create, update, patch, delete]
            - apiGroups: [""]
              resources: [events]
              verbs: [create, patch]
      clusterPermissions:
        - serviceAccountName: baseline-security-operator
          rules:
            - apiGroups: [""]
              resources: [namespaces]
              verbs: [create, get, list, watch]
            - apiGroups: [""]
              resources: [services]
              verbs: [create, delete, get, list, patch, update, watch]
            - apiGroups: [""]
              resources: [persistentvolumeclaims]
              verbs: [get, list, watch]
            - apiGroups: [apps]
              resources: [deployments]
              verbs: [create, delete, get, list, patch, update, watch]
            - apiGroups: [baselinesecurity.io]
              resources: [clusterbaselines]
              verbs: [create, get, list, patch, update, watch]
            - apiGroups: [baselinesecurity.io]
              resources: [clusterbaselines/status]
              verbs: [get, patch, update]
            - apiGroups: [baselinesecurity.io]
              resources: [clusterbaselines/finalizers]
              verbs: [update]
            - apiGroups: [compliance.openshift.io]
              resources: [compliancecheckresults, compliancescans]
              verbs: [get, list, watch]
            - apiGroups: [compliance.openshift.io]
              resources: [scansettingbindings, scansettings]
              verbs: [create, delete, get, list, patch, update, watch]
            - apiGroups: [console.openshift.io]
              resources: [consoleplugins]
              verbs: [create, delete, get, list, patch, update, watch]
            - apiGroups: [operator.openshift.io]
              resources: [consoles]
              verbs: [get, list, patch, update, watch]
            - apiGroups: [operators.coreos.com]
              resources: [clusterserviceversions]
              verbs: [get, list, watch]
            - apiGroups: [operators.coreos.com]
              resources: [operatorgroups, subscriptions]
              verbs: [create, get, list, watch]
            - apiGroups: [authentication.k8s.io]
              resources: [tokenreviews]
              verbs: [create]
            - apiGroups: [authorization.k8s.io]
              resources: [subjectaccessreviews]
              verbs: [create]
      deployments:
        - name: baseline-security-operator
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: baseline-security-operator
            template:
              metadata:
                labels:
                  app: baseline-security-operator
              spec:
                serviceAccountName: baseline-security-operator
                securityContext:
                  runAsNonRoot: true
                  seccompProfile:
                    type: RuntimeDefault
                affinity:
                  podAntiAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                      - weight: 100
                        podAffinityTerm:
                          labelSelector:
                            matchLabels:
                              app: baseline-security-operator
                          topologyKey: kubernetes.io/hostname
                containers:
                  - name: manager
                    image: quay.io/openshift-baseline-security/baseline-security-operator:0.2.1
                    args:
                      - --leader-elect
                      - --metrics-bind-address=:8443
                      - --metrics-secure=true
                      - --metrics-cert-dir=/var/run/metrics-certs
                    env:
                      - name: RELATED_IMAGE_CONSOLE_PLUGIN
                        value: quay.io/openshift-baseline-security/baseline-security-console-plugin:0.2.1
                    ports:
                      - name: https-metrics
                        containerPort: 8443
                        protocol: TCP
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop: [ALL]
                      readOnlyRootFilesystem: true
                    volumeMounts:
                      - name: metrics-certs
                        mountPath: /var/run/metrics-certs
                        readOnly: true
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 8081
                      initialDelaySeconds: 15
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: 8081
                      initialDelaySeconds: 5
                    resources:
                      requests:
                        cpu: 10m
                        memory: 64Mi
                volumes:
                  - name: metrics-certs
                    secret:
                      secretName: baseline-security-operator-metrics-cert
                      optional: true
  relatedImages:
    - name: console-plugin
      image: quay.io/openshift-baseline-security/baseline-security-console-plugin:0.2.1
