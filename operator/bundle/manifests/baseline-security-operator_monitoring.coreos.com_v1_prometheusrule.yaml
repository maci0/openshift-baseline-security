# Alerting on compliance posture, driven by the operator's custom metrics.
# Install alongside the ServiceMonitor when user-workload monitoring is enabled.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: baseline-security-operator
  labels:
    app: baseline-security-operator
spec:
  groups:
    - name: baseline-security.rules
      rules:
        - alert: ComplianceScoreLow
          # -1 is the "no score yet" sentinel; only alert on a real low score.
          # Threshold 80 is intentionally higher than console score color bands
          # (danger <60, success >=90) so paging is less noisy than the UI
          # (ADR-017). Only the leader updates gauges. Select the replica with
          # the newest observation timestamp so an old leader's stale value
          # cannot mask a lower score after failover.
          expr: >-
            max(baseline_security_compliance_score
              and on(instance) topk(1, baseline_security_status_observed_timestamp_seconds)) >= 0
            and
            max(baseline_security_compliance_score
              and on(instance) topk(1, baseline_security_status_observed_timestamp_seconds)) < 80
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: Cluster compliance score is below 80
            description: >-
              The baseline compliance score is {{ $value }} (threshold 80).
              Open Administration -> Compliance, filter Results by Fail, and
              review newlyFailed on the ClusterBaseline status. Check Degraded
              and ScanStorageReady conditions if the score is unexpectedly low.
              CLI: oc get clusterbaseline cluster -o yaml; operator/hack/must-gather.sh
        - alert: ComplianceChecksFailing
          # Select the newest publishing replica before summing profiles. This
          # avoids both HA double-counting and stale values after leader failover.
          expr: >-
            sum(baseline_security_checks{status="fail"}
              and on(instance) topk(1, baseline_security_status_observed_timestamp_seconds)) > 0
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: Compliance checks are failing
            description: >-
              {{ $value }} compliance check(s) are failing across the selected
              benchmark profiles. Open Administration -> Compliance -> Results
              (status=Fail). Compare status.newlyFailed vs fixed for regressions.
              CLI: oc get compliancecheckresults -n openshift-compliance
        - alert: ComplianceChecksInError
          # ERROR is distinct from FAIL: the check did not run cleanly (scanner,
          # RBAC, or node issues). Same HA newest-publisher selection as fails.
          expr: >-
            sum(baseline_security_checks{status="error"}
              and on(instance) topk(1, baseline_security_status_observed_timestamp_seconds)) > 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: Compliance checks are in ERROR state
            description: >-
              {{ $value }} compliance check(s) are in ERROR (not merely FAIL).
              Inspect ComplianceCheckResult objects in openshift-compliance and
              Compliance Operator pod logs; ERROR often means a scan/runtime
              problem rather than a policy violation.
              CLI: oc logs -n openshift-compliance deploy/compliance-operator --tail=200
        - alert: ComplianceChecksInconsistent
          # Genuine multi-node PASS-vs-FAIL split after benign NOT-APPLICABLE
          # collapse. Distinct from FAIL (policy) and ERROR (scan runtime).
          # 1h for: absorbs rolling-update / MCP reboot windows.
          expr: >-
            sum(baseline_security_checks{status="inconsistent"}
              and on(instance) topk(1, baseline_security_status_observed_timestamp_seconds)) > 0
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: Compliance checks are INCONSISTENT across nodes
            description: >-
              {{ $value }} compliance check(s) report genuine multi-node drift
              (PASS on some nodes, FAIL on others after benign NOT-APPLICABLE
              collapse). Open Administration -> Compliance -> Results (status
              Inconsistent) and inspect per-node sources on the check detail.
              CLI: oc get compliancecheckresults -n openshift-compliance
              -l compliance.openshift.io/check-status=INCONSISTENT
        - alert: ComplianceStatusStale
          # Operator stopped publishing (crash loop, stuck reconcile, scrape
          # only from a demoted replica that never aggregated). Timestamp 0 is
          # the pre-first-publish seed; treat it as never-published. The absent()
          # disjunct catches the series vanishing entirely (all replicas gone /
          # scaled to 0 / hard crashloop where the metrics server never binds),
          # which max() over an empty vector would otherwise miss.
          # Steady requeue is 1m; 15m covers leader election + install grace.
          expr: >-
            absent(baseline_security_status_observed_timestamp_seconds)
            or
            max(baseline_security_status_observed_timestamp_seconds) == 0
            or
            (time() - max(baseline_security_status_observed_timestamp_seconds)) > 900
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: Baseline security status metrics are stale
            description: >-
              ClusterBaseline metrics have not been published recently (or never).
              Check the baseline-security-operator Deployment and pod logs in
              openshift-baseline-security, leader election, and that user-workload
              monitoring scrapes the metrics ServiceMonitor.
              CLI: oc -n openshift-baseline-security get pods,servicemonitor;
              oc -n openshift-baseline-security logs deploy/baseline-security-operator --tail=200
        - alert: RemediationBatchStuck
          # batchResumeGrace is 10m; past ~20m the batch should have cleared.
          # A stuck batch means MachineConfigPools may remain paused.
          expr: >-
            max(baseline_security_remediation_batch_active
              and on(instance) topk(1, baseline_security_status_observed_timestamp_seconds)) == 1
          for: 20m
          labels:
            severity: critical
          annotations:
            summary: Remediation batch has not completed
            description: >-
              A MachineConfigPool-paused remediation batch has been active for
              over 20m. Inspect ClusterBaseline status.remediationBatch and
              MachineConfigPool .spec.paused; resume pools if the operator cannot
              (operator logs mention resume failures). Unpausing without care may
              trigger node reboots.
              CLI: oc get clusterbaseline cluster -o jsonpath='{.status.remediationBatch}{"\n"}';
              oc get mcp -o custom-columns=NAME:.metadata.name,PAUSED:.spec.paused
        - alert: ClusterBaselineDegraded
          # Covers InvalidSchedule, CSVFailed, InstallStalled, ScanStorageNotReady,
          # ConsolePluginUnavailable, and ReconcileError. Score/check alerts alone
          # miss operator-level degradation when aggregation still publishes.
          # 15m avoids paging on brief API blips that set Degraded then clear.
          expr: >-
            max(baseline_security_condition{type="Degraded"}
              and on(instance) topk(1, baseline_security_status_observed_timestamp_seconds)) == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: ClusterBaseline is Degraded
            description: >-
              The ClusterBaseline Degraded condition has been True for 15m.
              Check status.conditions on ClusterBaseline/cluster (reason and
              message), operator logs in openshift-baseline-security, and
              related detail conditions (ComplianceOperatorReady, ScanConfigured,
              ScanStorageReady, ConsolePluginReady).
              CLI: oc get clusterbaseline cluster -o jsonpath='{range .status.conditions[*]}{.type}={.status} {.reason} {.message}{"\n"}{end}';
              operator/hack/must-gather.sh
        - alert: ComplianceScanStale
          # Cadence-aware: fire when the last completed scan is older than 1.5x the
          # configured scan interval (allows one missed run plus slack for long
          # scans), instead of a hardcoded 36h that would false-page on any
          # non-daily schedule (a weekly scan is legitimately days old). For the
          # daily default (interval 86400s) this is 1.5*86400 = 129600s = 36h.
          # Both gauges are 0 when never scanned or scanning is disabled
          # (empty profiles/tailored); the > 0 guards skip those cases.
          # Operator publish freshness (ComplianceStatusStale) can stay green while
          # the Compliance Operator stops producing completed scans.
          # Select the newest publisher's series (same HA pattern as score/checks).
          expr: >-
            (
              max(baseline_security_last_scan_timestamp_seconds
                and on(instance) topk(1, baseline_security_status_observed_timestamp_seconds)) > 0
            )
            and
            (
              max(baseline_security_scan_interval_seconds
                and on(instance) topk(1, baseline_security_status_observed_timestamp_seconds)) > 0
            )
            and
            (
              time()
              - max(baseline_security_last_scan_timestamp_seconds
                and on(instance) topk(1, baseline_security_status_observed_timestamp_seconds))
              > 1.5 * max(baseline_security_scan_interval_seconds
                and on(instance) topk(1, baseline_security_status_observed_timestamp_seconds))
            )
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: Compliance scan is overdue for its schedule
            description: >-
              status.lastScanTime is more than 1.5x the configured scan interval old
              while metrics are still publishing. Check ComplianceSuites/Scans in
              openshift-compliance, ScanSetting schedule, and that profiles are selected.
              CLI: oc get clusterbaseline cluster -o jsonpath='{.status.lastScanTime}{"\n"}{.spec.schedule}{"\n"}';
              oc -n openshift-compliance get compliancesuites,compliancescans
        - alert: ComplianceRegressions
          # New FAILs since the previous completed scan. Fires even when overall
          # score stays above ComplianceScoreLow (threshold 80).
          expr: >-
            max(baseline_security_newly_failed
              and on(instance) topk(1, baseline_security_status_observed_timestamp_seconds)) > 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: New compliance check failures since last scan
            description: >-
              {{ $value }} check(s) newly failed versus the previous completed
              scan (status.newlyFailed). Open Administration -> Compliance
              Overview for the regressions list, or filter Results by Fail.
              CLI: oc get clusterbaseline cluster -o jsonpath='{.status.newlyFailed}{"\n"}'
